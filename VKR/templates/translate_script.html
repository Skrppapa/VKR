<script>
    document.addEventListener("DOMContentLoaded", function() {

        // 1. УБИРАЕМ ACTIONS
        document.querySelectorAll('.dropdown-toggle').forEach(el => {
            if (el.textContent.includes('Actions')) {
                const drop = el.closest('.dropdown');
                if (drop) drop.style.display = 'none';
            }
        });

        const exactBtnTranslations = {
            "Save": "Сохранить",
            "Save and continue editing": "Сохранить и продолжить",
            "Save and add another": "Сохранить и добавить еще",
            "Cancel": "Отмена",
            "Delete": "Удалить",
            "Go Back": "Назад",
            "Edit": "Изменить",
            "Details": "Просмотр",
            "Search": "Найти"
        };

        // 2. ИСПРАВЛЯЕМ ИНПУТЫ (ПОИСК И КНОПКИ СОХРАНЕНИЯ)
        function translateInputs() {
            document.querySelectorAll('input').forEach(input => {
                // Перевод поиска
                if (input.name === 'search' && input.placeholder) {
                    input.placeholder = input.placeholder.replace('Search:', 'Поиск:').replace('Search', 'Поиск...');
                }
                // Перевод кнопок типа <input type="submit" value="Save">
                if ((input.type === 'submit' || input.type === 'button') && exactBtnTranslations[input.value.trim()]) {
                    input.value = exactBtnTranslations[input.value.trim()];
                }
            });
        }

        // 3. ПЕРЕВОДЧИК ТЕКСТОВЫХ УЗЛОВ (Для кнопок <a>, <button> и заголовков)
        function translateTextNodes(node) {
            if (node.nodeType === Node.TEXT_NODE) {
                let originalText = node.nodeValue;
                let trimmed = originalText.trim();

                if (!trimmed) return;

                if (exactBtnTranslations[trimmed]) {
                    node.nodeValue = originalText.replace(trimmed, exactBtnTranslations[trimmed]);
                }
                else if (trimmed.includes("New ")) {
                    node.nodeValue = originalText.replace("New", "Добавить");
                }
                else if (trimmed.startsWith("Edit ")) {
                    node.nodeValue = originalText.replace("Edit ", "");
                }
            }
            else if (node.nodeType === Node.ELEMENT_NODE) {
                if (node.tagName !== "SCRIPT" && node.tagName !== "STYLE") {
                    node.childNodes.forEach(translateTextNodes);
                }
            }
        }

        // 4. ПЕРЕВОДЧИК ПАГИНАЦИИ (Обход внутренностей тега)
        function translatePagination() {
            document.querySelectorAll('p.text-muted, div.text-muted').forEach(el => {
                if (el.innerHTML.includes('Showing') && el.innerHTML.includes('items')) {
                    // Заменяем слова, не трогая HTML-теги <span> вокруг цифр
                    el.innerHTML = el.innerHTML
                        .replace('Showing', 'Показано')
                        .replace('to', 'по')
                        .replace('of', 'из')
                        .replace('items', 'записей');
                }
                if (el.textContent.trim() === "No records found") {
                    el.textContent = "Записи не найдены";
                }
            });
        }

        // 5. АВТОМАТИЧЕСКОЕ СКРЫТИЕ УВЕДОМЛЕНИЙ
        function autoHideAlerts() {
            // Ищем все всплывающие уведомления на странице
            const alerts = document.querySelectorAll('.alert');

            alerts.forEach(alert => {
                // Ждем 4 секунды (4000 мс)
                setTimeout(() => {
                    // Добавляем плавное затухание
                    alert.style.transition = 'opacity 0.5s ease, margin 0.5s ease, padding 0.5s ease, height 0.5s ease';
                    alert.style.opacity = '0';
                    alert.style.margin = '0';
                    alert.style.padding = '0';
                    alert.style.height = '0';
                    alert.style.overflow = 'hidden';

                    // Полностью удаляем элемент из HTML через полсекунды (когда закончится анимация)
                    setTimeout(() => alert.remove(), 500);
                }, 4000);
            });
        }

        // Запускаем все функции
        autoHideAlerts(); // <-- ДОБАВИЛИ ВЫЗОВ
        translateInputs();
        translateTextNodes(document.body);
        translatePagination();


        // Запуск с микрозадержкой для подстраховки динамического рендера
        setTimeout(() => {
            translateInputs();
            translateTextNodes(document.body);
        }, 150);
    });
</script>
