{% extends "custom_list.html" %}

{% block content %}
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            // 1. Создаем кнопку
            const createBtn = document.createElement('a');
            createBtn.href = '/admin/create-task';
            createBtn.className = 'btn btn-primary';
            createBtn.innerHTML = '<i class="fa-solid fa-plus" style="margin-right: 5px;"></i> Новое задание';

            // 2. Ищем заголовок таблицы (шапку)
            const cardHeader = document.querySelector('.card-header');

            if (cardHeader) {
                // Включаем Flexbox для раскидывания элементов по краям
                cardHeader.classList.add('d-flex', 'justify-content-between', 'align-items-center');

                // Убираем нижний отступ у самого текста "Ремонтные задания"
                const title = cardHeader.querySelector('.card-title');
                if (title) title.classList.add('mb-0');

                // Вставляем кнопку в правый край шапки
                cardHeader.appendChild(createBtn);
            }
        });
    </script>

    {{ super() }}
{% endblock %}
