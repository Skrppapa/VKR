<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Управление ремонтом МВПС{% endblock %}</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">

    <style>
        body {
            background-color: #fbfbfd;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        main { padding-top: 2rem; }

        .apple-card {
            background: #fff;
            border-radius: 16px;
            padding: 1.5rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02), 0 1px 3px rgba(0,0,0,0.04);
            margin-bottom: 1.5rem;
            border: 1px solid #e5e5ea;
        }

        nav {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: saturate(180%) blur(20px);
            border-bottom: 1px solid #e5e5ea;
            position: sticky;
            top: 0;
            z-index: 100;
            padding: 0.5rem 1rem;
        }

        .badge {
            padding: 0.2rem 0.6rem;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 600;
            background: #e5e5ea;
            color: #1d1d1f;
        }
        .badge.in-progress { background: #34c759; color: white; }
        .badge.paused { background: #ff9f0a; color: white; }

        .stage-row {
            border-left: 3px solid #007aff;
            padding-left: 1rem;
            margin-bottom: 0.8rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #fafafa;
            padding: 0.8rem 1rem;
            border-radius: 0 8px 8px 0;
        }
        .stage-row.completed { border-left-color: #34c759; opacity: 0.7; }
        .stage-row.paused { border-left-color: #ff9f0a; }
    </style>
</head>
<body>
    <nav class="container-fluid">
        <ul>
            <li><strong><a href="/workspace" class="contrast">МВПС Контроль</a></strong></li>
        </ul>
        <ul>
            <li><a href="/admin" target="_blank" class="secondary">SQLAdmin</a></li>
        </ul>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    {% block scripts %}{% endblock %}
</body>
</html>
