{% extends "base.html" %}

{% block title %}Авторизация{% endblock %}

{% block content %}
<div style="display: flex; justify-content: center; align-items: center; min-height: 70vh;">
    <article class="apple-card" style="width: 100%; max-width: 400px;">
        <hgroup style="text-align: center; margin-bottom: 2rem;">
            <h2>Вход в систему</h2>
            <p>Управление ремонтом МВПС</p>
        </hgroup>

        <form id="login-form">
            <label for="username">Имя пользователя</label>
            <input type="text" id="username" name="username" required>

            <label for="password">Пароль</label>
            <input type="password" id="password" name="password" required>

            <button type="submit" id="submit-btn" style="width: 100%; margin-top: 1rem;">Войти</button>
            <p id="error-message" style="color: #ff3b30; text-align: center; margin-top: 1rem; display: none;"></p>
        </form>
    </article>
</div>
{% endblock %}

{% block scripts %}
<script>
    // ПРОВЕРЬ ПРЕФИКС! Если твой роутер auth висит на /api/v1, укажи это здесь.
    const AUTH_URL = '/api/v1/auth/login';

    document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault(); // Останавливаем стандартную перезагрузку страницы

        const errorText = document.getElementById('error-message');
        const btn = document.getElementById('submit-btn');

        errorText.style.display = 'none';
        btn.setAttribute('aria-busy', 'true'); // Включаем крутилку на кнопке

        // Собираем данные в формате urlencoded, как того требует FastAPI OAuth2
        const formData = new URLSearchParams();
        formData.append('username', document.getElementById('username').value);
        formData.append('password', document.getElementById('password').value);

        try {
            const response = await fetch(AUTH_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                },
                body: formData.toString()
            });

            if (!response.ok) {
                throw new Error('Неверный логин или пароль');
            }

            const data = await response.json();

            // Сохраняем токен в локальное хранилище браузера
            localStorage.setItem('access_token', data.access_token);

            // Перенаправляем на рабочее место
            window.location.href = '/workspace';

        } catch (error) {
            errorText.innerText = error.message;
            errorText.style.display = 'block';
            btn.removeAttribute('aria-busy');
        }
    });
</script>
{% endblock %}
